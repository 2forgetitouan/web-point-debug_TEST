<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outil de debug clics/clavier</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family: Arial, sans-serif;
      }

      #hint {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #666;
        font-size: 13px;
        user-select: none;
      }

      .debug-point {
        position: fixed;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ff2d55;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="hint">Cliquez n'importe où puis appuyez sur des touches (voir console).</div>

    <script>
      const mouseButtonLabels = {
        0: 'clic gauche',
        1: 'clic molette',
        2: 'clic droit',
      };

      const createPoint = (x, y) => {
        const point = document.createElement('div');
        point.className = 'debug-point';
        point.style.left = `${x}px`;
        point.style.top = `${y}px`;
        document.body.appendChild(point);
      };

      document.addEventListener('mousedown', (event) => {
        const x = event.clientX;
        const y = event.clientY;
        const clickType = mouseButtonLabels[event.button] ?? `bouton souris ${event.button}`;

        createPoint(x, y);
        console.log(`[SOURIS] ${clickType} à x=${x}, y=${y}`);
      });

      document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      document.addEventListener('keydown', (event) => {
        console.log(`[CLAVIER] touche=${event.key} | code=${event.code}`);
      });
    </script>
  </body>
</html>
